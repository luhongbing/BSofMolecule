name: Build iOS App

on:
  push:
    branches:
      - main
    paths:
      - 'iOS版/**'
      - 'Web版/**'
  pull_request:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'iOS版/package-lock.json'

      - name: Install npm dependencies (iOS版)
        working-directory: ./iOS版
        run: npm ci

      - name: Build Web App
        working-directory: ./iOS版
        run: npm run build

      - name: Sync to iOS
        working-directory: ./iOS版
        run: npx cap sync ios

      - name: Build iOS Project
        working-directory: ./iOS版/ios/App
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERTIFICATE_PWD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROFILE_PWD: ${{ secrets.APPLE_PROFILE_PASSWORD }}
        run: |
          # Create variables
          KEYCHAIN_PASSWORD=${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          
          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          
          # Import certificate
          echo -n "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 --decode -o certificate.p12
          security import certificate.p12 -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k build.keychain
          
          # Import provisioning profile
          echo -n "${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode -o profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # Build the project
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -destination 'generic/platform=iOS' CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="Apple Distribution" DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} PROVISIONING_PROFILE_SPECIFIER="com.molecule.molecularwander" build CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            iOS版/ios/App/App/build/**/*.app
            iOS版/ios/App/App/build/**/*.ipa
          retention-days: 7
